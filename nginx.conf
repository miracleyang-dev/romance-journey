server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    # HTML / manifest / JS / CSS 都走"每次校验"：浏览器仍可命中 304，
    # 但文件一改立刻生效，无需手动加版本号
    location = / {
        add_header Cache-Control "no-cache" always;
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache" always;
    }
    location ~* \.(?:js|css)$ {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # 其它资源 & SPA 回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
